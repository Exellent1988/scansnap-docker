name: scansnap

services:
  scansnap:
    build:
      context: .
    image: scansnap:local
    working_dir: /work
    volumes:
      - ./output:/work
      - ./config:/config
    network_mode: host
    # Example daemon (set scanner IP):
    # command: ["--daemon", "-s", "192.168.2.117", "-o", "/work", "-d"]
    command: ["-h"]
